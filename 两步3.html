<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>双元素指令训练 - 智能语音版</title>
<style>
*{-webkit-tap-highlight-color:transparent;margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:#f5f7fa;height:100vh;overflow:hidden}
.page{display:none;height:100%;overflow-y:auto;padding:15px}
.page.active{display:block}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
h1{color:#2c3e50;text-align:center;font-size:22px;margin:10px 0}
.btn{background:#07c160;color:#fff;border:none;padding:15px;border-radius:8px;font-size:18px;width:100%;margin:10px 0;cursor:pointer;transition:all 0.2s}
.btn:active{transform:scale(0.98);opacity:0.9}
.btn:disabled{background:#ccc;cursor:not-allowed}
.grid{display:grid;gap:10px;margin:15px 0}
/* 不同难度的网格布局 */
.grid.level-4{grid-template-columns:repeat(2,1fr)}
.grid.level-6{grid-template-columns:repeat(3,1fr)}
.grid.level-8{grid-template-columns:repeat(4,1fr)}
.grid.level-10{grid-template-columns:repeat(5,1fr)}
@media(max-width:380px){
  .grid.level-8{grid-template-columns:repeat(3,1fr)}
  .grid.level-10{grid-template-columns:repeat(3,1fr)}
}
.item{background:#fff;border:2px solid #ddd;border-radius:10px;padding:15px;text-align:center;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100px}
.item:active{transform:scale(0.95)}
.item.selected{border-color:#27ae60;border-width:3px;background:rgba(39,174,96,0.05)}
.item.error{border-color:#e74c3c;border-width:3px}
.item.hint-active{animation:hintPulse 2s infinite;border:3px dashed #27ae60;background:rgba(39,174,96,0.1)}
@keyframes hintPulse{0%,100%{box-shadow:0 0 5px rgba(39,174,96,0.3)}50%{box-shadow:0 0 15px rgba(39,174,96,0.6)}}
.icon{font-size:40px;margin-bottom:5px;display:block}
.chair-red{filter:sepia(1)hue-rotate(-50deg)saturate(3)}
.chair-green{filter:sepia(1)hue-rotate(80deg)saturate(3)}
.chair-blue{filter:sepia(1)hue-rotate(180deg)saturate(3)}
.red{color:#e74c3c}.green{color:#27ae60}.blue{color:#3498db}
.instruction{background:#2c3e50;color:#fff;padding:25px 20px;margin:-15px -15px 20px;text-align:center;border-radius:0 0 20px 20px;position:relative}
.target{font-size:26px;font-weight:600;margin:10px 0}
.target-color{font-size:28px;font-weight:bold}
.stats-bar{display:flex;justify-content:center;gap:20px;margin-bottom:15px;padding:10px;background:#fff;border-radius:8px;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-size:20px;font-weight:bold;color:#2c3e50}
.stat-label{font-size:12px;color:#7f8c8d}
.prompt-status{background:#e8f4f8;border:1px solid #bee5eb;padding:10px;border-radius:8px;margin-bottom:15px;text-align:center;font-size:14px}
.prompt-status.no-prompt{background:#d4edda;border-color:#c3e6cb;color:#155724}
.prompt-status.need-prompt{background:#fff3cd;border-color:#ffeeba;color:#856404}
.streak-indicator{display:flex;justify-content:center;gap:10px;margin:10px 0}
.streak-dot{width:12px;height:12px;border-radius:50%;background:#ddd}
.streak-dot.active{background:#27ae60}
.streak-dot.error{background:#e74c3c}
.hint-btn{background:#f39c12;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-size:14px;cursor:pointer}
.voice-btn{background:#3498db;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:5px}
.voice-btn.muted{background:#95a5a6}
.exit-btn{background:#e74c3c;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-size:14px;cursor:pointer}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #eee;gap:10px;flex-wrap:wrap}
.feedback{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fff;padding:30px 40px;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,0.2);transition:all 0.3s;z-index:1000;text-align:center}
.feedback.show{transform:translate(-50%,-50%) scale(1)}
.mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;z-index:999}
.mask.show{display:block}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px}
.modal.show{display:flex}
.modal-content{background:#fff;padding:30px;border-radius:16px;text-align:center;width:100%;max-width:320px}

/* 难度选择器样式 */
.difficulty-selector{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:15px 0}
.diff-btn{background:#fff;border:2px solid #ddd;border-radius:10px;padding:15px;text-align:center;cursor:pointer;transition:all 0.2s}
.diff-btn.active{border-color:#07c160;background:rgba(7,193,96,0.05);border-width:3px}
.diff-btn .diff-num{font-size:24px;font-weight:bold;color:#2c3e50;display:block}
.diff-btn .diff-label{font-size:12px;color:#7f8c8d;margin-top:5px}
.diff-btn.active .diff-num{color:#07c160}

/* 语音播放动画 */
.voice-playing{animation:voiceWave 1s infinite}
@keyframes voiceWave{0%,100%{opacity:1}50%{opacity:0.5}}
.speak-icon{display:inline-block;margin-left:5px;font-size:20px}
</style>
</head>
<body>
<div id="home" class="page active">
<h1>双元素指令训练</h1>
<p style="text-align:center;color:#666;font-size:14px">智能语音版 - 自适应难度与语音辅助</p>

<div class="card">
<h3 style="margin:0 0 15px 0;font-size:16px">选择难度</h3>
<div class="difficulty-selector">
<div class="diff-btn" data-level="4" onclick="selectDifficulty(4)">
<span class="diff-num">4</span>
<span class="diff-label">图格 (入门)</span>
</div>
<div class="diff-btn active" data-level="6" onclick="selectDifficulty(6)">
<span class="diff-num">6</span>
<span class="diff-label">图格 (标准)</span>
</div>
<div class="diff-btn" data-level="8" onclick="selectDifficulty(8)">
<span class="diff-num">8</span>
<span class="diff-label">图格 (进阶)</span>
</div>
<div class="diff-btn" data-level="10" onclick="selectDifficulty(10)">
<span class="diff-num">10</span>
<span class="diff-label">图格 (挑战)</span>
</div>
</div>
</div>

<div class="card">
<h3 style="margin:0 0 15px 0;font-size:16px">语音设置</h3>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:15px">
<div>
<div style="font-size:14px;font-weight:600">语音朗读指令</div>
<div style="font-size:12px;color:#666;margin-top:3px">每轮自动朗读题目</div>
</div>
<div class="toggle-switch active" id="voiceToggle" onclick="toggleVoice()" style="width:44px;height:24px;background:#27ae60;border-radius:12px;position:relative;cursor:pointer;transition:all 0.3s">
<div style="width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:2px;right:2px;transition:all 0.3s"></div>
</div>
</div>
<button class="btn" onclick="testVoice()" style="margin:0;padding:10px;font-size:14px;background:#3498db">🔊 测试语音</button>
</div>

<div class="card">
<h3 style="margin:0 0 15px 0;font-size:16px">学习进度</h3>
<div class="stats-bar">
<div class="stat-item"><div class="stat-num" id="totalCount">0</div><div class="stat-label">总练习</div></div>
<div class="stat-item"><div class="stat-num" id="acc">0%</div><div class="stat-label">正确率</div></div>
<div class="stat-item"><div class="stat-num" id="stars">0</div><div class="stat-label">星星</div></div>
</div>
</div>

<div class="card">
<h3 style="margin:0 0 15px 0;font-size:16px">辅助设置</h3>
<div style="padding:10px;background:#f8f9fa;border-radius:8px;font-size:13px;color:#666">
💡 <strong>智能提示规则：</strong><br>
• 连续错误3次 → 自动显示视觉提示<br>
• 连续正确3次 → 自动撤除提示
</div>
</div>
<button class="btn" onclick="start()">🚀 开始训练</button>
</div>

<div id="train" class="page">
<div class="instruction">
<div style="font-size:15px;opacity:0.9;margin-bottom:5px">请找出：</div>
<div class="target"><span class="target-color" id="targetColor">红色</span>的<span id="targetName">苹果</span></div>
<button onclick="speakInstruction()" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.5);color:#fff;padding:5px 15px;border-radius:20px;margin-top:10px;font-size:13px;cursor:pointer">
🔊 重复朗读
</button>
</div>

<div class="prompt-status" id="promptStatus">🤖 智能提示：观察中...</div>

<div class="streak-indicator" id="streakIndicator">
<div class="streak-dot" id="streak1"></div>
<div class="streak-dot" id="streak2"></div>
<div class="streak-dot" id="streak3"></div>
</div>

<div class="stats-bar">
<div class="stat-item"><div class="stat-num" id="round">1/10</div><div class="stat-label">进度</div></div>
<div class="stat-item"><div class="stat-num" id="rightCount" style="color:#27ae60">0</div><div class="stat-label">正确</div></div>
<div class="stat-item"><div class="stat-num" id="wrongCount" style="color:#e74c3c">0</div><div class="stat-label">错误</div></div>
<div class="stat-item"><div class="stat-num" id="consecutive" style="color:#f39c12">0</div><div class="stat-label">连续</div></div>
</div>

<div class="grid" id="grid"></div>

<div style="height:100px"></div>

<div class="bottom-bar">
<button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
<span id="voiceIcon">🔊</span>
<span id="voiceText">语音开</span>
</button>
<button class="hint-btn" onclick="manualHint()">💡 提示</button>
<button class="exit-btn" onclick="location.reload()">结束</button>
</div>
</div>

<div class="mask" id="mask"></div>
<div class="feedback" id="feedback">
<div style="font-size:50px;margin-bottom:10px" id="fbIcon">🎉</div>
<div style="font-size:20px;font-weight:600" id="fbText">答对了！</div>
</div>

<script>
const cards=[
{id:'a-r',name:'苹果',color:'红色',icon:'🍎',c:'#e74c3c',cls:'icon red'},
{id:'a-g',name:'苹果',color:'绿色',icon:'🍏',c:'#27ae60',cls:'icon green'},
{id:'a-y',name:'苹果',color:'黄色',icon:'🍎',c:'#f1c40f',cls:'icon',style:'filter:sepia(1)saturate(5)'},
{id:'c-r',name:'椅子',color:'红色',icon:'🪑',c:'#e74c3c',cls:'icon chair-red'},
{id:'c-g',name:'椅子',color:'绿色',icon:'🪑',c:'#27ae60',cls:'icon chair-green'},
{id:'c-b',name:'椅子',color:'蓝色',icon:'🪑',c:'#3498db',cls:'icon chair-blue'},
{id:'c-y',name:'椅子',color:'黄色',icon:'🪑',c:'#f1c40f',cls:'icon',style:'filter:sepia(1)hue-rotate(10deg)saturate(5)'},
{id:'car-r',name:'汽车',color:'红色',icon:'🚗',c:'#e74c3c',cls:'icon red'},
{id:'car-b',name:'汽车',color:'蓝色',icon:'🚙',c:'#3498db',cls:'icon blue'},
{id:'car-g',name:'汽车',color:'绿色',icon:'🚗',c:'#27ae60',cls:'icon green'},
{id:'f-r',name:'花',color:'红色',icon:'🌹',c:'#e74c3c',cls:'icon red'},
{id:'f-p',name:'花',color:'粉色',icon:'🌸',c:'#ff69b4',cls:'icon'},
{id:'f-y',name:'花',color:'黄色',icon:'🌻',c:'#f1c40f',cls:'icon'},
{id:'b-r',name:'球',color:'红色',icon:'🔴',c:'#e74c3c',cls:'icon red'},
{id:'b-b',name:'球',color:'蓝色',icon:'🔵',c:'#3498db',cls:'icon blue'},
{id:'b-g',name:'球',color:'绿色',icon:'🟢',c:'#27ae60',cls:'icon green'}
];

let state={
round:1,
right:0,
wrong:0,
target:null,
lock:false,
consecutiveCorrect:0,
consecutiveError:0,
promptActive:false,
difficulty:6,
voiceEnabled:true,
totalRounds:10
};

// 语音合成初始化
let synth=window.speechSynthesis;
let voices=[];

function initVoices(){
voices=synth.getVoices();
// 优先选择中文语音
let zhVoice=voices.find(v=>v.lang.includes('zh')||v.lang.includes('CN'));
if(zhVoice){
console.log('使用语音:',zhVoice.name);
}
}

if(synth.onvoiceschanged!==undefined){
synth.onvoiceschanged=initVoices;
}
initVoices();

function selectDifficulty(level){
state.difficulty=level;
document.querySelectorAll('.diff-btn').forEach(btn=>{
btn.classList.remove('active');
if(parseInt(btn.dataset.level)===level){
btn.classList.add('active');
}
});
}

function toggleVoice(){
state.voiceEnabled=!state.voiceEnabled;
const toggle=document.getElementById('voiceToggle');
const btn=document.getElementById('voiceBtn');
if(toggle){
toggle.style.background=state.voiceEnabled?'#27ae60':'#ccc';
toggle.querySelector('div').style.right=state.voiceEnabled?'2px':'22px';
}
if(btn){
btn.classList.toggle('muted',!state.voiceEnabled);
document.getElementById('voiceIcon').textContent=state.voiceEnabled?'🔊':'🔇';
document.getElementById('voiceText').textContent=state.voiceEnabled?'语音开':'语音关';
}
}

function speakInstruction(){
if(!state.voiceEnabled||!state.target)return;
const text=`请找出：${state.target.color}的${state.target.name}`;
const utter=new SpeechSynthesisUtterance(text);
utter.lang='zh-CN';
utter.rate=0.9;
utter.pitch=1;
// 尝试找到中文语音
let zhVoice=voices.find(v=>v.lang.includes('zh')||v.lang.includes('CN')||v.name.includes('Chinese'));
if(zhVoice)utter.voice=zhVoice;
synth.cancel(); // 停止之前的语音
synth.speak(utter);
}

function testVoice(){
const text='语音测试成功，准备开始训练';
const utter=new SpeechSynthesisUtterance(text);
utter.lang='zh-CN';
utter.rate=0.9;
let zhVoice=voices.find(v=>v.lang.includes('zh')||v.lang.includes('CN'));
if(zhVoice)utter.voice=zhVoice;
synth.speak(utter);
}

function start(){
document.getElementById('home').classList.remove('active');
document.getElementById('train').classList.add('active');
// 根据难度调整总轮数
state.totalRounds=state.difficulty===4?8:(state.difficulty===10?12:10);
nextRound();
}

function nextRound(){
state.lock=false;
// 随机选择目标
state.target=cards[Math.floor(Math.random()*cards.length)];
document.getElementById('targetColor').textContent=state.target.color;
document.getElementById('targetColor').style.color=state.target.c;
document.getElementById('targetName').textContent=state.target.name;
document.getElementById('round').textContent=state.round+'/'+state.totalRounds;

// 构建候选池
let pool=[state.target];
let others=cards.filter(c=>c.id!==state.target.id).sort(()=>Math.random()-0.5);
// 根据难度选择干扰项数量
let distractorCount=state.difficulty-1;
pool.push(...others.slice(0,distractorCount));
pool.sort(()=>Math.random()-0.5);

// 渲染网格
let grid=document.getElementById('grid');
grid.className='grid level-'+state.difficulty;
grid.innerHTML='';

pool.forEach((c,i)=>{
let div=document.createElement('div');
div.className='item';
div.id='item'+i;
div.dataset.id=c.id;
div.onclick=function(){clickCard(i,c.id);};
let styleAttr=c.style?` style="${c.style}"` :'';
div.innerHTML=`<span class="${c.cls}"${styleAttr}>${c.icon}</span><div style="font-size:13px;margin-top:5px">${c.color}${c.name}</div>`;
grid.appendChild(div);
});

// 朗读指令
setTimeout(()=>{
speakInstruction();
// 智能提示策略
if(state.consecutiveError>=3&&!state.promptActive){
state.promptActive=true;
showHint();
document.getElementById('promptStatus').textContent='🤖 已开启提示（连续错误3次）';
document.getElementById('promptStatus').className='prompt-status need-prompt';
if(state.voiceEnabled){
let hintUtter=new SpeechSynthesisUtterance('注意看虚线框标注的物品');
hintUtter.lang='zh-CN';
synth.speak(hintUtter);
}
}else if(state.consecutiveCorrect>=3&&state.promptActive){
state.promptActive=false;
hideHint();
document.getElementById('promptStatus').textContent='🤖 已撤除提示（连续正确3次）';
document.getElementById('promptStatus').className='prompt-status no-prompt';
}
updateStreak();
},500);
}

function clickCard(idx,id){
if(state.lock)return;
state.lock=true;

let items=document.querySelectorAll('.item');
let correct=id===state.target.id;

if(correct){
items[idx].classList.add('selected');
state.right++;
state.consecutiveCorrect++;
state.consecutiveError=0;
showFb('🎉','答对了！');
if(state.voiceEnabled){
let goodUtter=new SpeechSynthesisUtterance('答对了，真棒！');
goodUtter.lang='zh-CN';
synth.speak(goodUtter);
}

setTimeout(()=>{
if(state.round>=state.totalRounds){
let acc=Math.round(state.right/state.totalRounds*100);
let msg=`训练完成！正确率：${acc}%`;
if(state.voiceEnabled){
let endUtter=new SpeechSynthesisUtterance(msg+',真棒！');
endUtter.lang='zh-CN';
synth.speak(endUtter);
}
setTimeout(()=>{
alert(msg);
location.reload();
},1000);
}else{
state.round++;
document.getElementById('round').textContent=state.round+'/'+state.totalRounds;
document.getElementById('rightCount').textContent=state.right;
updateStreak();
if(state.consecutiveCorrect>=3&&state.promptActive){
state.promptActive=false;
hideHint();
document.getElementById('promptStatus').textContent='🤖 已撤除提示（连续正确3次）';
document.getElementById('promptStatus').className='prompt-status no-prompt';
}
nextRound();
}
},1500);
}else{
items[idx].classList.add('error');
state.wrong++;
state.consecutiveError++;
state.consecutiveCorrect=0;
document.getElementById('wrongCount').textContent=state.wrong;
showFb('💡','再看看');
if(state.voiceEnabled){
let wrongUtter=new SpeechSynthesisUtterance('不对哦，再看看');
wrongUtter.lang='zh-CN';
synth.speak(wrongUtter);
}

setTimeout(()=>{
items[idx].classList.remove('error');
state.lock=false;
updateStreak();
if(state.consecutiveError>=3&&!state.promptActive){
state.promptActive=true;
showHint();
document.getElementById('promptStatus').textContent='🤖 已开启提示（连续错误3次）';
document.getElementById('promptStatus').className='prompt-status need-prompt';
if(state.voiceEnabled){
let hintUtter=new SpeechSynthesisUtterance('注意看虚线框标注的物品');
hintUtter.lang='zh-CN';
synth.speak(hintUtter);
}
}
},1500);
}
}

function updateStreak(){
for(let i=1;i<=3;i++){
let dot=document.getElementById('streak'+i);
dot.className='streak-dot';
if(i<=state.consecutiveCorrect)dot.classList.add('active');
if(i<=state.consecutiveError)dot.classList.add('error');
}
document.getElementById('consecutive').textContent=state.consecutiveCorrect>0?state.consecutiveCorrect:(state.consecutiveError>0?'-'+state.consecutiveError:0);
}

function showHint(){
document.querySelectorAll('.item').forEach(el=>{
if(el.dataset.id===state.target.id)el.classList.add('hint-active');
});
}

function hideHint(){
document.querySelectorAll('.item').forEach(el=>{
el.classList.remove('hint-active');
});
}

function manualHint(){
if(state.promptActive){
hideHint();
state.promptActive=false;
document.getElementById('promptStatus').textContent='🤖 手动关闭提示';
document.getElementById('promptStatus').className='prompt-status no-prompt';
}else{
showHint();
state.promptActive=true;
document.getElementById('promptStatus').textContent='🤖 手动开启提示';
document.getElementById('promptStatus').className='prompt-status need-prompt';
if(state.voiceEnabled){
let hintUtter=new SpeechSynthesisUtterance('看虚线框标注的物品');
hintUtter.lang='zh-CN';
synth.speak(hintUtter);
}
}
}

function showFb(icon,text){
document.getElementById('fbIcon').textContent=icon;
document.getElementById('fbText').textContent=text;
document.getElementById('mask').classList.add('show');
document.getElementById('feedback').classList.add('show');
setTimeout(()=>{
document.getElementById('mask').classList.remove('show');
document.getElementById('feedback').classList.remove('show');
},1200);
}

// 防止页面滚动
window.addEventListener('touchmove',function(e){
if(e.target.closest('.grid')){
e.preventDefault();
}
},{passive:false});
</script>
</body>
</html>
